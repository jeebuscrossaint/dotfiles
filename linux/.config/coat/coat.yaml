# ~/.config/coat/coat.yaml

# The 'enabled' key triggers STATE_ENABLED and expects a sequence (list)
enabled:
  - fish
  - foot
  - kitty
  - helix
  - neovim
  - hyprland
  - fuzzel
  - ranger
  - bat
  - btop
  - dunst
  - zathura
  - gtk
  - vesktop
  - sway
  - qt
  - waybar
  - labwc
  - swaylock
  - kde
  - firefox
  - mpv
  - code-oss

# The 'scheme' key is a top-level scalar
scheme: operator-mono-dark
prefer_base24: false

opacity:
  terminal: 1.0
  applications: 1.0
  desktop: 1.0
  popups: 1.0

# The 'font' key triggers in_font_section and expects a mapping (dictionary)
font:
  emoji: "Noto Color Emoji"
  monospace: "SFMono Nerd Font Mono"
  sansserif: "SFMono Nerd Font Mono"
  serif: "SFMono Nerd Font Mono"
  sizes:
    terminal: 11
    desktop: 11
    popups: 11
