# ~/.config/coat/coat.yaml

# The 'enabled' key triggers STATE_ENABLED and expects a sequence (list)
enabled:
  - fish
  - foot
  - helix
  - fuzzel
  - ranger
  - bat
  - btop
  - dunst
  - zathura
  - gtk
  - vesktop
  - sway
  - qt
  - waybar
  - labwc
  - swaylock
  - kde
  - firefox
  - mpv
  - code-oss
  
# The 'scheme' key is a top-level scalar
scheme: pencil-dark
prefer_base24: false

opacity:
  terminal: 0.7
  applications: 1.0
  desktop: 1.0
  popups: 1.0

# The 'font' key triggers in_font_section and expects a mapping (dictionary)
font:
  emoji: "Noto Color Emoji"
  monospace: "Lilex Nerd Font Mono"
  sansserif: "Lilex Nerd Font Mono"
  serif: "Lilex Nerd Font Mono"
  sizes:
    terminal: 11
    desktop: 11
    popups: 11
