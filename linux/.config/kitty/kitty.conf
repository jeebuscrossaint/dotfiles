# ~/.config/kitty/kitty.conf
#
# Colors AND font come from coat (run `coat apply kitty`); this include pulls in
# ~/.config/kitty/coat-theme.conf which coat regenerates on every theme change.
include coat-theme.conf

# ── Behaviour ────────────────────────────────────────────────────────────────
scrollback_lines        10000
enable_audio_bell       no
confirm_os_window_close 0
window_padding_width    16
mouse_hide_wait         2.0
cursor_blink_interval   0

# Animated cursor trail (the fun smear, in the shell)
cursor_trail            3
cursor_trail_decay      0.1 0.4

# ── Tabs ─────────────────────────────────────────────────────────────────────
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted

# ── Wayland ──────────────────────────────────────────────────────────────────
linux_display_server    wayland

# The kitty graphics protocol is built in — this is what lets Neovim render
# images inline (e.g. leetcode.nvim problem diagrams) when nvim runs in here.
