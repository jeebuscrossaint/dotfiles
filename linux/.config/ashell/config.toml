# coat theme: Dark Plus
# FredHappyface (https://github.com/fredHappyface)
#
# Generated by coat — run `coat apply ashell` to regenerate. ashell hot-reloads.
# coat owns this whole file (module layout + theme). Edit layout in the coat
# template templates/ashell.tera, then `coat apply ashell`.

position = "Top"
layer = "Top"
outputs = "All"

[osd]
enabled = true

[animations]
enabled = true

[modules]
left   = ["Workspaces", "WindowTitle", "KeyboardSubmap"]
center = ["Tempo"]
right  = ["MediaPlayer", "Privacy", "KeyboardLayout", ["SystemInfo", "Settings"], "Updates", "Tray"]

[workspaces]
visibility_mode = "All"
enable_workspace_filling = true

[window_title]
mode = "Title"
truncate_title_after_length = 48

[tempo]
format = "%H:%M"
date_format = "%A, %B %d"

[system_info.cpu]
warn_threshold = 70
alert_threshold = 90
[system_info.memory]
warn_threshold = 70
alert_threshold = 90
[system_info.temperature]
warn_threshold = 75
alert_threshold = 90
[system_info.disk]
warn_threshold = 80
alert_threshold = 95

[updates]
check_cmd = "checkupdates 2>/dev/null | wc -l"
update_cmd = "kitty -e paru -Syu"
interval = 3600

[settings]
enable_tooltips = true

# ── appearance (colors/font/opacity from the active coat scheme) ────────────
[appearance]
font_name = "SauceCodePro Nerd Font Mono"
scale_factor = 1.2
background = "#0E0E0E"
text = "#C5C5C5"
workspace_colors = ["#2472C8", "#11A8CD", "#BC3FBC", "#0DBC79", "#3B8EEA"]

[appearance.bar]
surface = "transparent"
opacity = 1
margin = "sm"

[appearance.primary]
base = "#2472C8"
strong = "#11A8CD"
weak = "#858585"
text = "#0E0E0E"

[appearance.secondary]
base = "#BC3FBC"

[appearance.success]
base = "#0DBC79"

[appearance.danger]
base = "#CD3131"

[appearance.menu]
opacity = 0.96
backdrop_blur = true
