# coat theme: Framer
# Framer (Maintained by Jesse Hoyos)
#
# Generated by coat — run `coat apply ashell` to regenerate. ashell hot-reloads.
# coat owns this whole file (module layout + theme). Edit layout in the coat
# template templates/ashell.tera, then `coat apply ashell`.

position = "Top"
layer = "Top"
outputs = "All"

[osd]
enabled = true

[animations]
enabled = true

[modules]
left   = ["Workspaces", "WindowTitle", "KeyboardSubmap"]
center = ["Tempo"]
right  = ["MediaPlayer", "Privacy", "KeyboardLayout", ["SystemInfo", "Settings"], "Updates", "Tray"]

[workspaces]
visibility_mode = "All"
enable_workspace_filling = true

[window_title]
mode = "Title"
truncate_title_after_length = 48

[tempo]
format = "%H:%M"
date_format = "%A, %B %d"

[system_info.cpu]
warn_threshold = 70
alert_threshold = 90
[system_info.memory]
warn_threshold = 70
alert_threshold = 90
[system_info.temperature]
warn_threshold = 75
alert_threshold = 90
[system_info.disk]
warn_threshold = 80
alert_threshold = 95

[updates]
check_cmd = "checkupdates 2>/dev/null | wc -l"
update_cmd = "kitty -e paru -Syu"
interval = 3600

[settings]
enable_tooltips = true

# ── appearance (colors/font/opacity from the active coat scheme) ────────────
[appearance]
font_name = "SauceCodePro Nerd Font Mono"
scale_factor = 1.2
background = "#181818"
text = "#D0D0D0"
workspace_colors = ["#20BCFC", "#ACDDFD", "#BA8CFC", "#32CCDC", "#FECB6E"]

[appearance.bar]
surface = "transparent"
opacity = 0.9
margin = "sm"

[appearance.primary]
base = "#20BCFC"
strong = "#ACDDFD"
weak = "#747474"
text = "#181818"

[appearance.secondary]
base = "#BA8CFC"

[appearance.success]
base = "#32CCDC"

[appearance.danger]
base = "#FD886B"

[appearance.menu]
opacity = 0.96
backdrop_blur = true
