# ~/.config/hypr/hyprlock.conf — Hyprland lock screen
# Blurred snapshot of your desktop + clock/date/user + a rounded password ring.
# The blurred-wallpaper background adapts to whatever's on screen, so it looks
# right regardless of your coat scheme.

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}

# Password input ring
input-field {
    monitor =
    size = 300, 54
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.32
    dots_center = true
    rounding = 14
    outer_color = rgba(7199eeff)
    inner_color = rgba(1a1b2ae6)
    font_color = rgba(e8e8f0ff)
    check_color = rgba(95c561ff)
    fail_color = rgba(ee6d85ff)
    fade_on_empty = true
    placeholder_text = <i>password…</i>
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    position = 0, -40
    halign = center
    valign = center
}

# Big clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 92
    font_family = Lilex Nerd Font Mono
    color = rgba(f1f1f5ff)
    position = 0, 220
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    font_size = 22
    font_family = Lilex Nerd Font Mono
    color = rgba(a0a8cdff)
    position = 0, 130
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =   $USER
    font_size = 16
    font_family = Lilex Nerd Font Mono
    color = rgba(a0a8cdff)
    position = 0, 55
    halign = center
    valign = center
}
