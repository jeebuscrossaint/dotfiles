# ~/.config/hypr/hyprland.conf
# ============================================================================
# Ported from the sway config — same keybinds, monitors, autostarts — plus the
# eye candy sway/SwayFX couldn't give you on Artix: animations, blur, shadows,
# rounded corners. Colours come from coat (sourced below), like your sway theme.
# Docs: https://wiki.hyprland.org
# ============================================================================

# ── Monitors (name, res@hz, position, scale, extra) ─────────────────────────
# bitdepth,10 keeps your 10-bit OLED output (sway had render_bit_depth 10).
monitor = eDP-1, 2560x1600@240, 0x0, 1, bitdepth, 10
monitor = HDMI-A-1, 3840x2160@30, 2560x0, 1, bitdepth, 10
monitor = , preferred, auto, 1   # fallback for any other display

# ── Programs ────────────────────────────────────────────────────────────────
$terminal = kitty
$menu     = fuzzel
$mod      = SUPER

# ── Colours from coat (generated by `coat apply hyprland`) ──────────────────
# Sets col.active_border / col.inactive_border / shadow color from your scheme,
# exactly like `include ~/.config/sway/coat-theme` did for sway.
source = ~/.config/hypr/coat-theme.conf

# ── Nvidia ──────────────────────────────────────────────────────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

# ── Cursor (rose-pine) ──────────────────────────────────────────────────────
# HYPRCURSOR = crisp scalable cursor for Wayland-native apps + Hyprland itself.
# XCURSOR = matching rose-pine theme for XWayland apps (games, some Electron).
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,BreezeX-RosePine-Linux
env = XCURSOR_SIZE,24
# If the cursor ever flickers/disappears on Nvidia, uncomment:
# cursor { no_hardware_cursors = true }

# ── Autostart (mirrors your sway `exec` lines; autotiling-rs dropped —
#    Hyprland's dwindle layout auto-tiles natively) ──────────────────────────
exec-once = dbus-update-activation-environment --all
exec-once = dbus-update-activation-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = /usr/libexec/xdg-desktop-portal
exec-once = hypridle
exec-once = waybar -c ~/.config/waybar/config.json -s ~/.config/waybar/style.css
exec-once = dunst
exec-once = sh -c 'command -v nm-applet && nm-applet'
exec-once = start-polkit
exec-once = canvas-notify
exec-once = artix-pipewire-launcher
exec-once = nvibrant 0 0 0 0
exec-once = refresh-paru-completions
# Clipboard history (cliphist) — recall with $mod+V
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Load hyprpm plugins (hyprexpo, etc.) on startup — no-op until you enable some
exec-once = hyprpm reload -n
# Smart fullscreen: auto-maximize a lone window on its workspace
exec-once = hyprland-smart-fullscreen

# ── Input (from sway: flat accel, natural scroll off, fast repeat) ──────────
input {
    kb_layout    = us
    repeat_delay = 200
    repeat_rate  = 50
    follow_mouse = 1
    sensitivity  = 0
    accel_profile = flat
    touchpad {
        natural_scroll = false
    }
}

cursor {
    inactive_timeout = 3   # hide cursor after 3s idle (sway: hide_cursor 3000)
}

# 3-finger touchpad swipe between workspaces (0.53+ gesture syntax)
gesture = 3, horizontal, workspace

# ── Layout / borders / gaps ─────────────────────────────────────────────────
general {
    border_size     = 2
    gaps_in         = 10    # small gaps so shadows + rounded corners are visible
    gaps_out        = 10    # (set both to 0 for your old gapless look)
    layout          = dwindle
    resize_on_border = true
    # border colours are set by coat (sourced above)
}

dwindle {
    preserve_split  = true
}

# ── Eye candy ───────────────────────────────────────────────────────────────
decoration {
    rounding = 10

    blur {
        enabled = true
        size    = 4
        passes  = 2
        new_optimizations = true
        ignore_opacity    = true
    }

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        # shadow colour set by coat (sourced above)
    }

    # dim_inactive stays off — kinder to OLED and less distracting.
    dim_inactive = false
}

animations {
    enabled = true
    # snappy, slightly springy — feels lively without being slow
    bezier = ease,     0.25, 0.10, 0.25, 1.00
    bezier = overshot, 0.05, 0.90, 0.10, 1.05

    animation = windows,     1, 3, overshot, popin 90%
    animation = windowsOut,  1, 3, ease,     popin 90%
    animation = border,      1, 5, ease
    animation = borderangle, 1, 30, ease     # slow gradient rotation (intentional)
    animation = fade,        1, 2, ease
    animation = workspaces,  1, 2, ease, slide
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0   # you use swaybg for wallpaper
}

# ── Smart fullscreen ────────────────────────────────────────────────────────
# A single tiled window on a workspace is put into true fullscreen (bar hidden)
# by the smart-fullscreen daemon (see autostart). Opening a second window drops
# it back to tiling.

# ── Window rules (0.53+ syntax: match conditions first, then rule + value) ──
windowrule = match:class ^(pavucontrol|nm-connection-editor|blueman-manager)$, float on
windowrule = match:title ^(Open File|Save File|Choose Files|Save As)$, float on
# Picture-in-Picture: float + pin across workspaces
#windowrule = match:title Picture-in-Picture, float on
windowrule = match:title Picture-in-Picture, pin on

# ── Layer blur (0.53+ syntax) ───────────────────────────────────────────────
# NOTE: waybar is intentionally NOT blurred — 0.55's layerrule parser doesn't
# accept `ignorezero`, so blurring the bar blurs its transparent gaps too (looks
# bad with per-module islands). Popups have near-opaque backgrounds, so blur is
# fine there.
layerrule = match:namespace notifications, blur on
# fuzzel's namespace; if blur doesn't show, run `hyprctl layers` to confirm it.
layerrule = match:namespace launcher, blur on

# ── Plugins (hyprpm) ────────────────────────────────────────────────────────
# hyprexpo: a Mission-Control-style overview of all workspaces ($mod+A).
# Enable it once with the hyprpm commands (see notes), then it loads on startup.
plugin {
    hyprexpo {
        columns = 3
        gap_size = 6
        bg_col = rgba(0d0d0dee)
        workspace_method = center current
        enable_gesture = false   # keep the 3-finger swipe for normal ws switching
    }

    # hyprfocus: subtle flash when window focus changes. `hyprpm enable hyprfocus`
    hyprfocus {
        enabled = yes
        animate_floating = yes
        animate_workspacechange = yes
        focus_animation = flash
        bezier = focusIn,  0.15, 0.85, 0.30, 1.05
        bezier = focusOut, 0.20, 0.60, 0.35, 1.00
        flash {
            flash_opacity = 0.92
            in_bezier  = focusIn
            in_speed   = 0.4
            out_bezier = focusOut
            out_speed  = 2.5
        }
    }
}

# ── Keybinds (your sway binds + Hyprland-native extras) ──────────────────────
bind = $mod, Q, exec, $terminal
bind = $mod, D, exec, $menu
bind = $mod, C, killactive
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod, L, exec, hyprlock
bind = $mod, Delete, exec, wlboard
bind = $mod, P, exec, toggle-waybar
bind = $mod SHIFT, S, exec, swayscreenshot
bind = $mod SHIFT, E, exec, swayscreenshot-edit
bind = $mod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, V, togglefloating
bind = $mod, F, fullscreen,          # true fullscreen
bind = $mod, M, fullscreen, 1        # maximize (keeps gaps + bar) — new

# ── Hyprland-native window management (no sway equivalent) ──────────────────
# Scratchpad: a hidden "special" workspace you toss a window into and toggle
# on top of anything. Great for a dropdown terminal, notes, music, chat.
bind = $mod, grave,       togglespecialworkspace, magic
bind = $mod SHIFT, grave, movetoworkspace, special:magic

# Tabbed window groups: stack windows into one tabbed container (like browser
# tabs). $mod+G groups/ungroups; $mod+Tab cycles tabs within the group.
bind = $mod, G,   togglegroup
bind = $mod, Tab, changegroupactive, f

# Dwindle layout controls
bind = $mod, backslash, layoutmsg, togglesplit   # flip the split direction
bind = $mod, U,         pseudo        # pseudo-tile: float-size inside the tile

# hyprexpo plugin: overview of all workspaces (enable via hyprpm first)
bind = $mod, A, hyprexpo:expo, toggle

# Focus (arrows)
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move window (arrows + vim keys)
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move container to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Mouse: hold $mod to drag-move / drag-resize (sway floating_modifier)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Resize submap ($mod+R, then arrows/hjkl, Esc/Enter to exit) — like sway's resize mode
bind = $mod, R, submap, resize
submap = resize
binde = , left,  resizeactive, -20 0
binde = , right, resizeactive,  20 0
binde = , up,    resizeactive,  0 -20
binde = , down,  resizeactive,  0  20
binde = , H, resizeactive, -20 0
binde = , L, resizeactive,  20 0
binde = , K, resizeactive,  0 -20
binde = , J, resizeactive,  0  20
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# ── Media / brightness keys (from sway) ─────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, volumectl up
bindel = , XF86AudioLowerVolume,  exec, volumectl down
bindl  = , XF86AudioMute,         exec, volumectl toggle-mute
bindl  = , XF86AudioMicMute,      exec, volumectl -m toggle-mute
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86Launch3,           exec, playerctl play-pause
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
