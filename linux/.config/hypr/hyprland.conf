# ~/.config/hypr/hyprland.conf
# ============================================================================
# Ported from the sway config — same keybinds, monitors, autostarts — plus the
# eye candy sway/SwayFX couldn't give you on Artix: animations, blur, shadows,
# rounded corners. Colours come from coat (sourced below), like your sway theme.
# Docs: https://wiki.hyprland.org
# ============================================================================

# ── Monitors (name, res@hz, position, scale, extra) ─────────────────────────
# bitdepth,10 keeps your 10-bit OLED output (sway had render_bit_depth 10).
monitor = eDP-1, 2560x1600@240, 0x0, 1, bitdepth, 10
monitor = HDMI-A-1, 3840x2160@30, 2560x0, 1, bitdepth, 10
monitor = , preferred, auto, 1   # fallback for any other display

# ── Programs ────────────────────────────────────────────────────────────────
$terminal = kitty
$menu     = fuzzel
$mod      = SUPER

# ── Colours from coat (generated by `coat apply hyprland`) ──────────────────
# Sets col.active_border / col.inactive_border / shadow color from your scheme,
# exactly like `include ~/.config/sway/coat-theme` did for sway.
source = ~/.config/hypr/coat-theme.conf

# ── GPU: Hybrid mode (iGPU drives display, dGPU sleeps until prime-run) ───────
# REQUIRES BIOS set to Hybrid/MSHybrid (NOT "dGPU only / Ultra"). In dGPU-only
# the internal eDP panel is muxed to the NVIDIA card, so this Intel-primary
# config would give a BLACK SCREEN. If that happens: Ctrl+Alt+F2, log in, and
# comment out the AQ_DRM_DEVICES line below (or set BIOS to Hybrid).
#
# Intel Arc iGPU (card1) is PRIMARY — it composites the internal display, so the
# RTX 4070 (card0) can idle to D3cold (~0W). card0 is also listed so Hyprland
# can drive external monitors wired to the dGPU (HDMI on ASUS is often dGPU-side)
# — it should only wake the dGPU when such an output is actually plugged in.
# Games: `prime-run <cmd>` offloads to the dGPU on demand.
# NOTE: aquamarine wants the REAL /dev/dri/cardN nodes — it rejects the
# /dev/dri/by-path/... symlinks (backend fails -> Hyprland crash). ORDER matters:
# Intel (card1) MUST be first = primary. Current mapping: card0=NVIDIA(0x10de),
# card1=INTEL(0x8086). If a kernel update renumbers them (black screen, or dGPU
# won't sleep), check `cat /sys/class/drm/card*/device/vendor` and fix the order.
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
env = __GLX_VENDOR_LIBRARY_NAME,mesa
# HW video decode on the Arc iGPU (needs: paru -S intel-media-driver)
env = LIBVA_DRIVER_NAME,iHD
# GTK4 defaults to its Vulkan renderer, and with both Intel + nvidia Vulkan
# devices present it picks the DISCRETE one — silently waking the RTX 4070 for
# every GTK4 app (zathura, nautilus, etc.). Force the GL renderer, which goes
# through EGL and uses the Intel iGPU, so GTK4 apps stop waking the dGPU.
env = GSK_RENDERER,gl

# ── Cursor (rose-pine) ──────────────────────────────────────────────────────
# HYPRCURSOR = crisp scalable cursor for Wayland-native apps + Hyprland itself.
# XCURSOR = matching rose-pine theme for XWayland apps (games, some Electron).
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,32
env = XCURSOR_THEME,BreezeX-RosePine-Linux
env = XCURSOR_SIZE,32
# If the cursor ever flickers/disappears on Nvidia, uncomment:
# cursor { no_hardware_cursors = true }

# ── Autostart (mirrors your sway `exec` lines; autotiling-rs dropped —
#    Hyprland's dwindle layout auto-tiles natively) ──────────────────────────
exec-once = dbus-update-activation-environment --all
exec-once = dbus-update-activation-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = /usr/libexec/xdg-desktop-portal
exec-once = hypridle
exec-once = waybar -c ~/.config/waybar/config.json -s ~/.config/waybar/style.css
exec-once = dunst
exec-once = sh -c 'command -v nm-applet && nm-applet'
exec-once = start-polkit
exec-once = canvas-notify
exec-once = artix-pipewire-launcher
exec-once = auto-refresh   # ProMotion-style 240Hz(AC)/60Hz(battery)
exec-once = refresh-paru-completions
# Clipboard history (cliphist) — recall with $mod+V
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Load hyprpm plugins (gloview, dynamic-cursors, hyprfocus) on startup
exec-once = hyprpm reload -n
# Smart fullscreen: auto-maximize a lone window on its workspace
#exec-once = hyprland-smart-fullscreen

# ── Input (from sway: flat accel, natural scroll off, fast repeat) ──────────
input {
    kb_layout    = us
    repeat_delay = 200
    repeat_rate  = 50
    follow_mouse = 1
    sensitivity  = 0
    accel_profile = flat
    touchpad {
        natural_scroll = false
    }
}

cursor {
    inactive_timeout = 3   # hide cursor after 3s idle (sway: hide_cursor 3000)
}

# 3-finger touchpad swipe between workspaces (0.53+ gesture syntax)
gesture = 3, horizontal, workspace
# 4-finger swipe up → gloview overview
gesture = 4, up, dispatcher, gloview:toggle

# Touchpad: adaptive acceleration (matches sway's default). The global
# accel_profile=flat above is for mice only, like sway's `input type:pointer`.
device {
    name = asup1207:00-093a:3012-touchpad
    accel_profile = adaptive
    natural_scroll = false
}

# ── Layout / borders / gaps ─────────────────────────────────────────────────
general {
    border_size     = 0    # borders off (colours below are kept but unused)
    gaps_in         = 10    # small gaps so shadows + rounded corners are visible
    gaps_out        = 10    # (set both to 0 for your old gapless look)
    layout          = dwindle
    resize_on_border = true
    # border colours from coat variables ($baseXX, sourced above)
    #    col.active_border   = $base0D $base0C 45deg
    col.active_border = $coat_shadow
    col.inactive_border = $coat_shadow
}

dwindle {
    preserve_split  = true
}

# ── Eye candy ───────────────────────────────────────────────────────────────
decoration {
    rounding = 12

    # Windows fully opaque at the compositor level. App-level transparency (e.g.
    # kitty's 0.7 background from coat) still shows through and gets frosted by
    # the native blur below — that's the intended see-through-terminal look.
    active_opacity   = 1.0
    inactive_opacity = 0.90

    blur {
        enabled = true
        size    = 10        # wide sample = big, diffuse frost
        passes  = 3         # fewer passes vs size = less smoothing, so the frost
                            # breaks into uneven "splotchy" patches (and lighter on
                            # battery than passes 4). Raise to 4 for a smooth frost.
        # the frost: grain + a milky, slightly punchy tone instead of a clean smear
        noise      = 0.012   # fine grain — the actual "frosted" texture (default 0.0117)
        contrast   = 1.02    # keeps edges from going muddy (default 0.8916)
        brightness = 0.95    # milky, lifted look (default 0.8172)
        vibrancy   = 0.18   # keep some colour life in the frost (default 0.1696)
        new_optimizations = true
        ignore_opacity    = true
    }

    shadow {
        enabled      = true
        range        = 32   # wider = more diffuse, softer spread
        render_power = 3    # lower = gentler falloff (softer edge)
        color        = $coat_shadow   # coat base00, alpha set in the template
    }

    # dim_inactive stays off — kinder to OLED and less distracting.
    dim_inactive = false
}

animations {
    enabled = true
    # snappy, slightly springy — feels lively without being slow
    bezier = ease,     0.25, 0.10, 0.25, 1.00
    bezier = overshot, 0.05, 0.90, 0.10, 1.05
    # snappy + bubbly: fast launch, overshoots the target then springs back
    bezier = wsBounce, 0.22, 1.30, 0.30, 1.00

    animation = windows,     1, 2.5, wsBounce, popin 90%   # bubbly pop-in
    animation = windowsOut,  1, 2,   ease,     popin 90%   # quick fade-out
    animation = border,      1, 2.5, ease                  # snappy focus border (was 500ms)
    animation = layers,      1, 3,   ease,     popin 80%   # launcher/notifs pop in, no bounce
    # borderangle loop disabled: rotating the gradient border forced a ~60fps
    # repaint forever (~4.5% CPU / battery + heat). Border stays a static 45°
    # gradient — same look, no perpetual redraw.
    animation = borderangle, 0, 30, linear
    animation = fade,        1, 2, ease
    # workspace slide: quick with a little spring. The `2.4` is duration in ds
    # (0.24s) — lower = snappier, raise toward 3–4 for a bigger, bouncier swing.
    animation = workspaces,  1, 2.4, wsBounce, slide
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0   # you use swaybg for wallpaper
}

# ── Smart fullscreen ────────────────────────────────────────────────────────
# A single tiled window on a workspace is put into true fullscreen (bar hidden)
# by the smart-fullscreen daemon (see autostart). Opening a second window drops
# it back to tiling.

# ── Window rules (0.53+ syntax: match conditions first, then rule + value) ──
#windowrule = match:class ^(pavucontrol|nm-connection-editor|blueman-manager)$, float on
windowrule = match:title ^(Open File|Save File|Choose Files|Save As)$, float on
# Picture-in-Picture: float + pin across workspaces
#windowrule = match:title Picture-in-Picture, float on
windowrule = match:title Picture-in-Picture, pin on

# ── Layer blur (0.53+ syntax) ───────────────────────────────────────────────
# NOTE: waybar is intentionally NOT blurred — 0.55's layerrule parser doesn't
# accept `ignorezero`, so blurring the bar blurs its transparent gaps too (looks
# bad with per-module islands). Popups have near-opaque backgrounds, so blur is
# fine there.
layerrule = match:namespace notifications, blur on
# fuzzel's namespace; if blur doesn't show, run `hyprctl layers` to confirm it.
layerrule = match:namespace launcher, blur on

# ── Plugins (hyprpm) ────────────────────────────────────────────────────────
# Enable each once with hyprpm (see the commands in the git commit / notes),
# then `exec-once = hyprpm reload -n` above loads them on every startup.
plugin {
    # gloview: macOS Mission-Control-style overview. Replaces hymission (which
    # black-screen-crashed on 0.56). Dispatcher `gloview:toggle`, bound to $mod+A
    # and 4-finger swipe up below. Enable via hyprpm (see notes). Full config keys
    # under plugin:gloview:* — see the repo table.
    gloview {
        strip_offset        = 44                # push the top strip below the 36px waybar
        # colours from coat variables (sourced above)
        backdrop_color      = $coat_ov_backdrop
        strip_active_border = $coat_ov_accent
        select_border       = $coat_ov_accent
        hover_border        = $coat_ov_accent2
    }

    # dynamic-cursors: physics-y cursor. mode=stretch squishes the cursor in the
    # direction of motion (comic-style); shake-to-find disabled.
    # x86_64 only. `hyprpm add https://github.com/VirtCode/hypr-dynamic-cursors`
    dynamic-cursors {
        enabled   = true
        mode      = stretch
        threshold = 2   # min angle change (deg) before reshaping; smaller = smoother
        shake {
            enabled = false
        }
    }

    # hyprglass removed — its liquid-glass render didn't work on 0.56 and only
    # fought Hyprland's native blur. Native blur + kitty's transparent bg gives
    # the frosted look instead. Re-trial when it supports 0.56: re-add the block,
    # `hyprpm enable hyprglass`.

    # hyprfocus: subtle flash when window focus changes. `hyprpm enable hyprfocus`
    hyprfocus {
        enabled = yes
        animate_floating = yes
        animate_workspacechange = yes
        focus_animation = flash
        bezier = focusIn,  0.15, 0.85, 0.30, 1.05
        bezier = focusOut, 0.20, 0.60, 0.35, 1.00
        flash {
            flash_opacity = 0.92
            in_bezier  = focusIn
            in_speed   = 0.4
            out_bezier = focusOut
            out_speed  = 2.5
        }
    }

    # hyprbars: macOS-style title bar. `hyprpm enable hyprbars`.
    # Traffic lights on the LEFT, title centred. Buttons are declared RIGHT->LEFT,
    # so to read red-yellow-green left-to-right we list green, yellow, red.
    # Circles show plain; the ×/–/+ glyphs appear on hover (icon_on_hover), just
    # like macOS. inactive_button_color greys them out when the window's unfocused.
    hyprbars {
        bar_height   = 30
        bar_color    = rgba(2a273fcc)   # base01 @ ~80% so the blur frosts it
        bar_blur     = true
        col.text     = $base05
        bar_text_size   = 12
        bar_text_weight = semibold
        bar_text_align  = center
        bar_part_of_window = true        # bar sits under the window's rounding/shadow
        bar_buttons_alignment = left     # traffic lights on the left, macOS-style
        bar_padding        = 12          # left/right edge inset for the light cluster
        bar_button_padding = 8           # gap between the lights
        icon_on_hover      = true        # bare circles; symbols only on hover
        inactive_button_color = rgb(6e6a86)   # base03 grey when unfocused

        # hyprbars-button = bgcolor, size, icon, on-click, fgcolor
        # green  = maximize (matches $mod+M / $mod+F)
        hyprbars-button = rgb(28c840), 7, +, hyprctl dispatch fullscreen 1, rgb(0a3d12)
        # yellow = minimise -> the existing "magic" scratchpad ($mod+grave recalls it)
        hyprbars-button = rgb(febc2e), 7, –, hyprctl dispatch movetoworkspacesilent special:magic, rgb(5a3d00)
        # red    = close
        hyprbars-button = rgb(ff5f57), 7, ×, hyprctl dispatch killactive, rgb(5a0000)

        # double-click the bar to maximize, like macOS
        on_double_click = hyprctl dispatch fullscreen 1
    }
}

# ── Keybinds (your sway binds + Hyprland-native extras) ──────────────────────
bind = $mod, Q, exec, $terminal
bind = $mod, D, exec, $menu
bind = $mod, C, killactive
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod, L, exec, hyprlock
bind = $mod, Delete, exec, wlboard
bind = $mod, P, exec, toggle-waybar
bind = $mod, T, exec, theme-pick                     # fuzzel coat scheme picker
bind = $mod SHIFT, T, exec, theme-random             # random coat scheme
bind = $mod SHIFT, S, exec, swayscreenshot
bind = $mod SHIFT, E, exec, swayscreenshot-edit
bind = $mod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, V, togglefloating
bind = $mod, F,       fullscreen, 1   # maximize: fills the screen, keeps the bar + gaps
bind = $mod SHIFT, F, fullscreen, 0   # true fullscreen: covers everything, bar hidden
bind = $mod, M,       fullscreen, 1   # maximize (same as $mod+F) — kept for muscle memory

# ── Hyprland-native window management (no sway equivalent) ──────────────────
# Scratchpad: a hidden "special" workspace you toss a window into and toggle
# on top of anything. Great for a dropdown terminal, notes, music, chat.
bind = $mod, grave,       togglespecialworkspace, magic
bind = $mod SHIFT, grave, movetoworkspace, special:magic

# Tabbed window groups: stack windows into one tabbed container (like browser
# tabs). $mod+G groups/ungroups; $mod+Tab cycles tabs within the group.
bind = $mod, G,   togglegroup
bind = $mod, Tab, changegroupactive, f

# Dwindle layout controls
bind = $mod, backslash, layoutmsg, togglesplit   # flip the split direction
bind = $mod, U,         pseudo        # pseudo-tile: float-size inside the tile

# gloview plugin: Mission-Control overview (enable via hyprpm first)
bind = $mod, A, gloview:toggle

# Focus (arrows)
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move window (arrows + vim keys)
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move container to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Mouse: hold $mod to drag-move / drag-resize (sway floating_modifier)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Resize submap ($mod+R, then arrows/hjkl, Esc/Enter to exit) — like sway's resize mode
bind = $mod, R, submap, resize
submap = resize
binde = , left,  resizeactive, -20 0
binde = , right, resizeactive,  20 0
binde = , up,    resizeactive,  0 -20
binde = , down,  resizeactive,  0  20
binde = , H, resizeactive, -20 0
binde = , L, resizeactive,  20 0
binde = , K, resizeactive,  0 -20
binde = , J, resizeactive,  0  20
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# ── Media / brightness keys (from sway) ─────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, volumectl up
bindel = , XF86AudioLowerVolume,  exec, volumectl down
bindl  = , XF86AudioMute,         exec, volumectl toggle-mute
bindl  = , XF86AudioMicMute,      exec, volumectl -m toggle-mute
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86Launch3,           exec, playerctl play-pause
# -d intel_backlight: the OLED panel (eDP-1) is on the Intel card. Without -d,
# brightnessctl may target the dead nvidia_0 device. Requires kernel param
# i915.enable_dpcd_backlight=1 for the control to actually reach the panel.
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -d intel_backlight set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl -d intel_backlight set 5%-
bindl  = , XF86TouchpadToggle,    exec, hypr-touchpad-toggle   # fn+F10

