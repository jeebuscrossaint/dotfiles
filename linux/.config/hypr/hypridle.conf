# ~/.config/hypr/hypridle.conf — idle daemon for Hyprland
# (sway/labwc keep using swayidle; this is Hyprland's native counterpart.)

general {
    # `pidof hyprlock || hyprlock` = never stack two lock screens.
    lock_cmd        = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock   # lock before suspend
    after_sleep_cmd  = hyprctl dispatch dpms on      # wake displays on resume
}

# Lock after 5 minutes idle
listener {
    timeout    = 300
    on-timeout = pidof hyprlock || hyprlock
}

# Turn the displays off after 10 minutes; back on when you return
listener {
    timeout    = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
